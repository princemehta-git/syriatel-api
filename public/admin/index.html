<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Syriatel Cash Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="screen">
    <div class="login-bg-pattern"></div>
    <div class="login-box">
      <div class="login-brand">
        <div class="login-logo">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="40" height="40" rx="10" fill="url(#logo-grad)"/>
            <path d="M12 14h16v2H12v-2zm0 5h12v2H12v-2zm0 5h10v2H12v-2z" fill="white" opacity="0.9"/>
            <defs><linearGradient id="logo-grad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop stop-color="#00d4aa"/><stop offset="1" stop-color="#0891b2"/></linearGradient></defs>
          </svg>
        </div>
        <h2>Syriatel Cash Admin</h2>
        <p class="login-subtitle">Secure administration portal</p>
      </div>
      <form class="login-form" onsubmit="event.preventDefault(); doLogin();">
        <div class="input-group">
          <label for="login-username">Username</label>
          <input id="login-username" type="text" placeholder="Enter your username" autocomplete="username">
        </div>
        <div class="input-group">
          <label for="login-password">Password</label>
          <input id="login-password" type="password" placeholder="Enter your password" autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary btn-full">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader"></span>
        </button>
        <div id="login-error" class="error-msg"></div>
      </form>
    </div>
  </div>

  <!-- Main Screen -->
  <div id="main-screen" class="screen" style="display:none">
    <header class="main-header">
      <div class="header-left">
        <div class="header-logo">
          <svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="url(#hdr-grad)"/><path d="M10 12h12v1.5H10V12zm0 4h10v1.5H10V16zm0 4h8v1.5h-8V20z" fill="white" opacity="0.9"/><defs><linearGradient id="hdr-grad" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#00d4aa"/><stop offset="1" stop-color="#0891b2"/></linearGradient></defs></svg>
        </div>
        <h1>Syriatel Cash Admin</h1>
      </div>
      <div class="header-right">
        <button onclick="doLogout()" class="btn-logout">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab active" onclick="showTab('accounts')" data-tab="accounts">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Linked Accounts
      </button>
      <button class="tab" onclick="showTab('add')" data-tab="add">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add New Account
      </button>
    </nav>

    <main class="main-content">
      <!-- Linked Accounts Tab -->
      <div id="tab-accounts" class="tab-content active">
        <div class="toolbar">
          <div class="search-wrapper">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input id="accounts-search" type="text" placeholder="Search by name, GSM, API key..." oninput="filterAccounts()" class="search-input">
          </div>
          <button onclick="loadAccounts()" class="btn-refresh">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            Refresh
          </button>
        </div>
        <div class="table-wrapper">
          <table id="accounts-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>GSM</th>
                <th>Password</th>
                <th>API Key</th>
                <th>PIN</th>
                <th>Account ID</th>
                <th>Linked At</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="accounts-body"></tbody>
          </table>
        </div>
      </div>

      <!-- Add New Account Tab -->
      <div id="tab-add" class="tab-content" style="display:none">
        <div class="form-card">
          <div class="form-header">
            <h3>Link New Account</h3>
            <p class="form-desc">Connect a Syriatel Cash account to the admin panel</p>
          </div>
          <div id="signin-form" class="form-body">
            <div class="input-group">
              <label for="add-gsm">GSM Number</label>
              <input id="add-gsm" type="text" placeholder="e.g. 0986121503">
            </div>
            <div class="input-group">
              <label for="add-password">Password</label>
              <input id="add-password" type="password" placeholder="Account password">
            </div>
            <div class="input-group">
              <label for="add-name">Name <span class="optional">(optional)</span></label>
              <input id="add-name" type="text" placeholder="Display name">
            </div>
            <div class="input-group">
              <label for="add-pin">Default PIN <span class="optional">(optional)</span></label>
              <input id="add-pin" type="text" placeholder="Default PIN for transfers">
            </div>
            <label class="checkbox-label">
              <input id="add-isnew" type="checkbox" checked>
              <span>Force new account (ignore existing session)</span>
            </label>
            <button onclick="doSignin()" class="btn-primary btn-full">Sign In</button>
          </div>
          <div id="otp-form" class="form-body" style="display:none">
            <div class="otp-info">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              <p>OTP required. Check your phone for the verification code.</p>
            </div>
            <div class="input-group">
              <label for="add-otp">OTP Code</label>
              <input id="add-otp" type="text" placeholder="Enter 6-digit code" maxlength="6">
            </div>
            <div class="btn-row">
              <button onclick="doSubmitOtp()" class="btn-primary">Submit OTP</button>
              <button onclick="doResendOtp()" class="btn-secondary">Resend OTP</button>
            </div>
          </div>
          <div id="add-error" class="error-msg"></div>
          <div id="add-success" class="success-msg"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- GSM Detail Modal -->
  <div id="gsm-modal" class="modal" style="display:none">
    <div class="modal-backdrop" onclick="closeGsmModal()"></div>
    <div class="modal-content modal-slide">
      <div class="modal-header">
        <h3 id="gsm-modal-title">GSMs</h3>
        <button onclick="closeGsmModal()" class="btn-close" aria-label="Close">&times;</button>
      </div>
      <div id="gsm-modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- History Modal -->
  <div id="history-modal" class="modal" style="display:none">
    <div class="modal-backdrop" onclick="closeHistoryModal()"></div>
    <div class="modal-content modal-wide modal-slide">
      <div class="modal-header">
        <h3 id="history-modal-title">History</h3>
        <button onclick="closeHistoryModal()" class="btn-close" aria-label="Close">&times;</button>
      </div>
      <div id="history-modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- Transfer Modal -->
  <div id="transfer-modal" class="modal" style="display:none">
    <div class="modal-backdrop" onclick="closeTransferModal()"></div>
    <div class="modal-content modal-slide">
      <div class="modal-header">
        <h3 id="transfer-modal-title">Transfer Money</h3>
        <button onclick="closeTransferModal()" class="btn-close" aria-label="Close">&times;</button>
      </div>
      <div id="transfer-modal-body" class="modal-body">
        <div class="input-group">
          <label for="transfer-to">Recipient</label>
          <input id="transfer-to" type="text" placeholder="GSM or secret code">
        </div>
        <div class="input-group">
          <label for="transfer-amount">Amount (SYP)</label>
          <input id="transfer-amount" type="number" placeholder="Amount" min="1">
        </div>
        <div class="input-group">
          <label for="transfer-pin">PIN <span class="optional">(leave empty for stored PIN)</span></label>
          <input id="transfer-pin" type="text" placeholder="PIN">
        </div>
        <button onclick="doTransfer()" class="btn-primary btn-full">Send Transfer</button>
        <div id="transfer-error" class="error-msg"></div>
        <div id="transfer-success" class="success-msg"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
